<!doctype html>
<html dir='ltr' lang='en-US'>
<head>
    <meta charset='UTF-8'>
    <meta content='width=device-width, initial-scale=1.0' name='viewport'/>
    <!-- favicon -->
    <!-- google fonts -->
    <link href='https://fonts.googleapis.com' rel='preconnect'>
    <link crossorigin href='https://fonts.gstatic.com' rel='preconnect'>
    <link href='https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap'
          rel='stylesheet'>
    <!-- normalize styles-->
    <link href='./css/normalize.css' rel='stylesheet'>
    <!-- main styles -->
    <link href='./css/main.css' rel='stylesheet' type='text/css'>
    <!-- main scripts -->
    <script defer src='./js/main.js'></script>
    <title>AgencyAI</title>
</head>
<body>
<!-- header and navigation -->
<header class='header'>
    <section class='header-navbar utils-container'>
        <div class='navbar-logo'>
            <a class='navbar-logo-brand' href='#'>Agency<span>AI</span></a>
        </div>
        <nav class='navbar-nav' id='navbar'>
            <ul class='navbar-list' id='navbarList'>
                <li class='navbar-list-item'>
                    <a class='navbar-list-link active' href='#home'>home</a>
                </li>
                <li class='navbar-list-item'>
                    <a class='navbar-list-link' href='#about'>about</a>
                </li>
                <li class='navbar-list-item'>
                    <a class='navbar-list-link' href='#services'>services</a>
                </li>
                <li class='navbar-list-item'>
                    <a class='navbar-list-link' href='#team'>team</a>
                </li>
                <li class='navbar-list-item'>
                    <a class='navbar-list-link' href='#contact'>contact</a>
                </li>
            </ul>
            
        </nav>
        <div class='navbar-buttons'>
            <button id='ctaButton' class='menu-button' type='button'>
                <a class='cta-button' href='#'>Start Now</a>
            </button>
            <button class='menu-button' id='lightDarkButton' type='button'>
                <img alt='moon or sun' id='lightDarkIcon'
                     src='./assets/img/moon.png' width='40' height='40'/>
            </button>
            <button class='menu-button' id='menuButton' type='button'>
                <span class='menu-button-bar'></span>
            </button>
        </div>
    </section>
